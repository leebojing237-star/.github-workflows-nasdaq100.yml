name: Nasdaq-100 Screener

on:
  schedule:
    - cron: "0 22 * * *"   # 22:00 UTC = 6am SGT
  workflow_dispatch: {}

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.NASDAQ100_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.NASDAQ100_SHEET_ID }}
        run: python screener/nasdaq100.py
